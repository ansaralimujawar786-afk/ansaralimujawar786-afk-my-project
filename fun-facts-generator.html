<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fun Facts Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1a3e 25%, #2d1b4e 50%, #1a1a3e 75%, #0a0e27 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
            color: #e0e0ff;
            overflow-x: hidden;
        }

        @keyframes gradientShift {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        /* Animated background orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            z-index: -1;
            pointer-events: none;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #00d4ff, #0066ff);
            top: -100px;
            left: -100px;
            animation: float 20s infinite ease-in-out;
        }

        .orb-2 {
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, #ff00ff, #8000ff);
            bottom: -50px;
            right: -50px;
            animation: float 25s infinite ease-in-out reverse;
        }

        .orb-3 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, #00ff88, #0066ff);
            top: 50%;
            right: 10%;
            animation: float 30s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% {
                transform: translate(0, 0);
            }
            50% {
                transform: translate(30px, -30px);
            }
        }

        /* Container */
        .container {
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
            z-index: 1;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 40px;
            animation: slideDown 0.7s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .title {
            font-size: 3.5em;
            font-weight: 800;
            background: linear-gradient(135deg, #00d4ff, #ff00ff, #00ff88);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientFlow 3s ease infinite;
            margin-bottom: 10px;
            text-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
            letter-spacing: -1px;
        }

        @keyframes gradientFlow {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        .subtitle {
            font-size: 1.1em;
            color: #a0a0ff;
            font-weight: 300;
            letter-spacing: 1px;
        }

        /* Counter Section */
        .counter-section {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 35px;
            animation: fadeIn 0.8s ease-out 0.2s backwards;
        }

        .counter-card {
            background: rgba(0, 212, 255, 0.1);
            border: 2px solid rgba(0, 212, 255, 0.3);
            border-radius: 15px;
            padding: 15px 25px;
            backdrop-filter: blur(10px);
            text-align: center;
            transition: all 0.3s ease;
        }

        .counter-card:hover {
            border-color: rgba(0, 212, 255, 0.8);
            background: rgba(0, 212, 255, 0.15);
            transform: translateY(-5px);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
        }

        .counter-label {
            font-size: 0.85em;
            color: #a0a0ff;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 5px;
        }

        .counter-value {
            font-size: 2em;
            font-weight: 700;
            color: #00d4ff;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.6);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Category Filters */
        .filters-section {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 35px;
            flex-wrap: wrap;
            animation: fadeIn 0.8s ease-out 0.3s backwards;
        }

        .filter-btn {
            padding: 10px 22px;
            border: 2px solid rgba(0, 212, 255, 0.3);
            background: rgba(0, 212, 255, 0.05);
            color: #00d4ff;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 600;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            backdrop-filter: blur(10px);
        }

        .filter-btn:hover {
            border-color: rgba(0, 212, 255, 0.8);
            background: rgba(0, 212, 255, 0.2);
            transform: translateY(-3px);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.4);
        }

        .filter-btn.active {
            border-color: #ff00ff;
            background: rgba(255, 0, 255, 0.25);
            color: #ff00ff;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.6);
            text-shadow: 0 0 10px rgba(255, 0, 255, 0.4);
        }

        /* Main Fact Card */
        .fact-container {
            display: flex;
            justify-content: center;
            animation: fadeIn 0.8s ease-out 0.4s backwards;
        }

        .fact-card {
            width: 100%;
            max-width: 700px;
            background: rgba(15, 20, 60, 0.7);
            border: 2px solid rgba(0, 212, 255, 0.2);
            border-radius: 25px;
            padding: 50px 40px;
            backdrop-filter: blur(20px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3),
                        0 0 40px rgba(0, 212, 255, 0.15),
                        inset 0 0 20px rgba(0, 212, 255, 0.05);
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position: relative;
            overflow: hidden;
        }

        .fact-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.1), transparent, rgba(255, 0, 255, 0.1));
            pointer-events: none;
            border-radius: 25px;
        }

        .fact-card:hover {
            border-color: rgba(0, 212, 255, 0.5);
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.4),
                        0 0 60px rgba(0, 212, 255, 0.25),
                        inset 0 0 30px rgba(0, 212, 255, 0.1);
            transform: translateY(-10px);
        }

        .fact-card.new-fact {
            animation: cardFlip 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        @keyframes cardFlip {
            0% {
                opacity: 0;
                transform: rotateX(90deg) rotateY(20deg);
            }
            50% {
                opacity: 0.5;
                transform: rotateX(45deg) rotateY(10deg);
            }
            100% {
                opacity: 1;
                transform: rotateX(0) rotateY(0);
            }
        }

        .fact-content {
            position: relative;
            z-index: 2;
        }

        .fact-category {
            display: inline-block;
            padding: 6px 14px;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.2), rgba(255, 0, 255, 0.2));
            border: 1px solid rgba(0, 212, 255, 0.5);
            border-radius: 20px;
            font-size: 0.8em;
            color: #00d4ff;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
            margin-bottom: 15px;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
        }

        .fact-text {
            font-size: 1.5em;
            line-height: 1.7;
            color: #e0e0ff;
            margin-bottom: 20px;
            font-weight: 500;
            letter-spacing: 0.3px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .fact-source {
            font-size: 0.9em;
            color: #a0a0ff;
            font-style: italic;
            opacity: 0.8;
        }

        /* Buttons Section */
        .buttons-section {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
            flex-wrap: wrap;
            animation: fadeIn 0.8s ease-out 0.5s backwards;
        }

        .btn {
            padding: 14px 35px;
            border: 2px solid rgba(0, 212, 255, 0.4);
            background: rgba(0, 212, 255, 0.1);
            color: #00d4ff;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 700;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.3), transparent);
            transition: left 0.5s ease;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:hover {
            border-color: rgba(0, 212, 255, 0.8);
            background: rgba(0, 212, 255, 0.2);
            transform: translateY(-3px);
            box-shadow: 0 0 25px rgba(0, 212, 255, 0.5);
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.6);
        }

        .btn-primary {
            background: linear-gradient(135deg, #00d4ff, #0066ff);
            border: 2px solid transparent;
            color: #0a0e27;
        }

        .btn-primary:hover {
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.6), 0 0 60px rgba(0, 102, 255, 0.3);
            transform: translateY(-5px);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #ff00ff, #8000ff);
            border: 2px solid transparent;
            color: #0a0e27;
        }

        .btn-secondary:hover {
            box-shadow: 0 0 30px rgba(255, 0, 255, 0.6), 0 0 60px rgba(128, 0, 255, 0.3);
            transform: translateY(-5px);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 40px;
            color: #a0a0ff;
        }

        .empty-state-icon {
            font-size: 4em;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-state-text {
            font-size: 1.2em;
            margin-bottom: 20px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .title {
                font-size: 2.5em;
            }

            .fact-card {
                padding: 35px 25px;
                margin: 0 15px;
            }

            .fact-text {
                font-size: 1.2em;
            }

            .counter-section {
                gap: 15px;
            }

            .filters-section {
                gap: 8px;
            }

            .filter-btn {
                padding: 8px 16px;
                font-size: 0.8em;
            }

            .btn {
                padding: 12px 24px;
                font-size: 0.9em;
            }
        }

        @media (max-width: 480px) {
            .title {
                font-size: 2em;
            }

            .subtitle {
                font-size: 0.95em;
            }

            .fact-card {
                padding: 25px 20px;
                margin: 0 10px;
                border-radius: 18px;
            }

            .fact-text {
                font-size: 1.1em;
                line-height: 1.6;
            }

            .buttons-section {
                flex-direction: column;
                gap: 10px;
            }

            .btn {
                width: 100%;
            }

            .counter-section {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <!-- Animated Background Orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <!-- Main Container -->
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1 class="title">✨ Fun Facts</h1>
            <p class="subtitle">Discover Fascinating Facts from Around the World</p>
        </div>

        <!-- Counter Section -->
        <div class="counter-section">
            <div class="counter-card">
                <div class="counter-label">Facts Viewed</div>
                <div class="counter-value" id="viewCounter">0</div>
            </div>
            <div class="counter-card">
                <div class="counter-label">Current Category</div>
                <div class="counter-value" id="categoryDisplay">All</div>
            </div>
        </div>

        <!-- Category Filters -->
        <div class="filters-section" id="filtersContainer"></div>

        <!-- Fact Card -->
        <div class="fact-container">
            <div class="fact-card" id="factCard">
                <div class="fact-content">
                    <span class="fact-category" id="factCategory">Science</span>
                    <p class="fact-text" id="factText">Click "New Fact" to discover something amazing!</p>
                    <p class="fact-source" id="factSource">— Fun Facts Generator</p>
                </div>
            </div>
        </div>

        <!-- Buttons Section -->
        <div class="buttons-section">
            <button class="btn btn-primary" onclick="getNewFact()">🎲 New Fact</button>
            <button class="btn btn-secondary" onclick="copyToClipboard()">📋 Copy Fact</button>
        </div>
    </div>

    <script>
        // Facts Database
        const factsDatabase = {
            science: [
                {
                    text: "Honey never spoils. Archaeologists have found 3,000-year-old honey in Egyptian tombs that was still perfectly edible.",
                    source: "National Geographic"
                },
                {
                    text: "A single bolt of lightning is about 5 times hotter than the surface of the Sun.",
                    source: "NASA"
                },
                {
                    text: "The human brain uses 20% of the body's energy while only making up 2% of its weight.",
                    source: "Scientific American"
                },
                {
                    text: "Octopuses have three hearts and blue blood due to copper-based hemocyanin instead of iron-based hemoglobin.",
                    source: "Marine Biology Today"
                },
                {
                    text: "A sneeze travels at speeds of up to 100 miles per hour and can travel up to 26 feet.",
                    source: "MIT Fluid Dynamics Study"
                }
            ],
            history: [
                {
                    text: "Cleopatra lived closer to the invention of the iPhone than to the construction of the Great Pyramid.",
                    source: "Timeline History"
                },
                {
                    text: "Oxford University is older than the Aztec Empire by about 100 years.",
                    source: "Historical Records"
                },
                {
                    text: "The shortest war in history lasted only 38-45 minutes between Britain and Zanzibar in 1896.",
                    source: "Guinness World Records"
                },
                {
                    text: "Vikings used to give kittens as wedding gifts to brides instead of flowers.",
                    source: "Norse History Archives"
                },
                {
                    text: "Napoleon was not actually particularly short for his time—he was about 5'7\", which was average.",
                    source: "Historical Biography"
                }
            ],
            nature: [
                {
                    text: "A group of flamingos is called a 'flamboyance,' which perfectly describes their vibrant nature.",
                    source: "Animal Kingdom"
                },
                {
                    text: "Butterflies taste with their feet to find out whether the host plant is suitable for laying eggs.",
                    source: "Entomology Journal"
                },
                {
                    text: "The smell of petrichor (rain on earth) comes from geosmin, produced by bacteria in the soil.",
                    source: "Environmental Science"
                },
                {
                    text: "A single giant sequoia tree can weigh more than 14 blue whales combined.",
                    source: "Forestry Research"
                },
                {
                    text: "Polar bears have black skin under their white fur, and their fur is actually transparent, not white.",
                    source: "Polar Wildlife Study"
                }
            ],
            technology: [
                {
                    text: "The first webcam was invented so coffee lovers could check if there was coffee in the pot before going to the break room.",
                    source: "Tech History"
                },
                {
                    text: "The '@' symbol is called different names worldwide: in Italy it's 'snail,' in Greece it's 'little duck,' and in Sweden it's 'elephant's trunk.'",
                    source: "Linguistics Today"
                },
                {
                    text: "The first item ever sold on eBay was a broken laser pointer for $14.83 in 1995.",
                    source: "eBay Archives"
                },
                {
                    text: "It would take over 5 million years to download all the data stored on the Internet at 1 Mbps.",
                    source: "Data Statistics"
                },
                {
                    text: "The term 'bug' in software comes from a moth that got trapped in an early computer in 1945.",
                    source: "Computer History Museum"
                }
            ],
            space: [
                {
                    text: "A day on Venus is longer than a year on Venus, taking 243 Earth days to rotate on its axis.",
                    source: "NASA Space Science"
                },
                {
                    text: "If you could somehow stand on the Sun, a year would pass in a blink because time moves slower near massive objects.",
                    source: "Einstein's Theory of Relativity"
                },
                {
                    text: "Neutron stars are so dense that a teaspoon of their material would weigh 6 billion tons on Earth.",
                    source: "Astrophysics Quarterly"
                },
                {
                    text: "The light we see from distant galaxies left them millions of years ago, so we're essentially looking into the past.",
                    source: "Cosmology Today"
                },
                {
                    text: "Saturn's rings are made mostly of water ice and could have originated from a destroyed moon or captured comet.",
                    source: "Planetary Science Institute"
                }
            ],
            animals: [
                {
                    text: "Dolphins have names for each other and respond to their individual names in a way similar to humans.",
                    source: "Marine Mammal Science"
                },
                {
                    text: "A goldfish's memory lasts only about 3 seconds—actually false! They can remember for months.",
                    source: "Animal Cognition Research"
                },
                {
                    text: "Sloths only defecate once a week and can lose up to 30% of their body weight when they do.",
                    source: "Wildlife Biology"
                },
                {
                    text: "Cows have best friends and get stressed when separated from them.",
                    source: "Animal Behavior Studies"
                },
                {
                    text: "Anglerfish in the deep sea literally fuse together, with the male's body merging into the female's for reproduction.",
                    source: "Marine Biology"
                }
            ]
        };

        let currentFact = null;
        let viewCount = 0;
        let currentCategory = 'all';
        const allCategories = Object.keys(factsDatabase);

        // Initialize the app
        function init() {
            renderFilterButtons();
            getNewFact();
        }

        // Render filter buttons
        function renderFilterButtons() {
            const container = document.getElementById('filtersContainer');
            container.innerHTML = '';

            // All button
            const allBtn = document.createElement('button');
            allBtn.className = 'filter-btn active';
            allBtn.textContent = '🌟 All';
            allBtn.onclick = () => setCategory('all');
            container.appendChild(allBtn);

            // Category buttons
            allCategories.forEach(category => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn';
                btn.textContent = category.charAt(0).toUpperCase() + category.slice(1);
                btn.onclick = () => setCategory(category);
                container.appendChild(btn);
            });
        }

        // Set category filter
        function setCategory(category) {
            currentCategory = category;
            updateActiveFilter();
            updateCategoryDisplay();
            getNewFact();
        }

        // Update active filter button
        function updateActiveFilter() {
            const buttons = document.querySelectorAll('.filter-btn');
            buttons.forEach((btn, index) => {
                if ((currentCategory === 'all' && index === 0) || 
                    (currentCategory !== 'all' && btn.textContent.toLowerCase().includes(currentCategory))) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
        }

        // Update category display
        function updateCategoryDisplay() {
            const display = document.getElementById('categoryDisplay');
            if (currentCategory === 'all') {
                display.textContent = 'All';
            } else {
                display.textContent = currentCategory.charAt(0).toUpperCase() + currentCategory.slice(1);
            }
        }

        // Get random fact
        function getNewFact() {
            let factsList = [];

            if (currentCategory === 'all') {
                for (const category in factsDatabase) {
                    factsList = factsList.concat(factsDatabase[category]);
                }
            } else {
                factsList = factsDatabase[currentCategory] || [];
            }

            if (factsList.length === 0) return;

            const randomIndex = Math.floor(Math.random() * factsList.length);
            currentFact = factsList[randomIndex];

            displayFact();
            viewCount++;
            updateCounter();
        }

        // Display fact with animation
        function displayFact() {
            const factCard = document.getElementById('factCard');
            factCard.classList.remove('new-fact');
            
            // Trigger reflow to restart animation
            void factCard.offsetWidth;
            
            factCard.classList.add('new-fact');

            const categoryMap = {
                science: 'Science',
                history: 'History',
                nature: 'Nature',
                technology: 'Technology',
                space: 'Space',
                animals: 'Animals'
            };

            // Determine category from text match
            let detectedCategory = 'General';
            for (const [key, facts] of Object.entries(factsDatabase)) {
                if (facts.includes(currentFact)) {
                    detectedCategory = categoryMap[key];
                    break;
                }
            }

            document.getElementById('factCategory').textContent = detectedCategory;
            document.getElementById('factText').textContent = currentFact.text;
            document.getElementById('factSource').textContent = `— ${currentFact.source}`;
        }

        // Update view counter
        function updateCounter() {
            document.getElementById('viewCounter').textContent = viewCount;
        }

        // Copy fact to clipboard
        function copyToClipboard() {
            if (!currentFact) return;

            const textToCopy = `${currentFact.text}\n\n— ${currentFact.source}`;
            
            navigator.clipboard.writeText(textToCopy).then(() => {
                const btn = event.target;
                const originalText = btn.textContent;
                btn.textContent = '✓ Copied!';
                
                setTimeout(() => {
                    btn.textContent = originalText;
                }, 2000);
            });
        }

        // Initialize app on load
        window.addEventListener('load', init);
    </script>
</body>
</html>
